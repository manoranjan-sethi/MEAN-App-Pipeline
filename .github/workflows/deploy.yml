name: CI/CD MEAN Stack Deployment

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set image tag
      id: vars
      run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/mean-backend:${{ steps.vars.outputs.tag }}

    - name: Build and Push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/mean-frontend:${{ steps.vars.outputs.tag }}

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        IMAGE_TAG: ${{ steps.vars.outputs.tag }}
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        envs: DOCKER_USERNAME,IMAGE_TAG
        script: |
          cd ~/MEAN-App-Pipeline
          git pull origin main
          sudo -E docker compose pull
          sudo -E docker compose up -d