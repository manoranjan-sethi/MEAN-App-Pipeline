services:
  mongo:
    image: mongo:7
    container_name: mean-mongo
    ports:
      - "27018:27017"  
    volumes:
      - mongo_data:/data/db

  backend:
    image: ${DOCKER_USERNAME:-local}/mean-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mean-backend
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongo:27017/dd_db
    depends_on:
      - mongo

  frontend:
    image: ${DOCKER_USERNAME:-local}/mean-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mean-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
