services:
  mongo:
    image: mongo:7
    container_name: mean-mongo
    ports:
      - "27018:27017"   # host 27018 to avoid conflict with local MongoDB on 27017
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mean-backend
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongo:27017/dd_db
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mean-frontend
    ports:
      - "8082:80"   # host 8082 (8081 often in use by local frontend)
    depends_on:
      - backend

volumes:
  mongo_data:
